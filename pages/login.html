<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | AzureStay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-layout">
      <section class="auth-art">
        <a class="brand" href="../index.html">
          <span class="brand-mark">A</span>
          <span>AzureStay</span>
        </a>
        <h1>Welcome back to your hotel command center.</h1>
        <p>Use guest@azurestay.com / guest123 or admin@azurestay.com / admin123 to explore the demo flows.</p>
      </section>
      <section class="auth-card">
        <div class="auth-card-header">
          <div>
            <p class="eyebrow">Secure access</p>
            <h2>Login</h2>
          </div>
          <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme">
            <span data-theme-icon>☀</span>
            <span data-theme-label>Light</span>
          </button>
        </div>
        <form class="stack-form" data-login-form>
          <label>
            Email
            <input type="email" name="email" placeholder="admin@azurestay.com" required />
          </label>
          <label>
            Password
            <input type="password" name="password" placeholder="admin123" required />
          </label>
          <button class="primary-button" type="submit">Login</button>
        </form>
        <p class="form-footer">New here? <a href="signup.html">Create an account</a></p>
        <p class="form-footer"><a href="../index.html">Back to home</a></p>
      </section>
    </main>
    <div class="toast-stack" data-toast-stack></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="module" src="../assets/js/auth.js"></script>
  </body>
</html>
