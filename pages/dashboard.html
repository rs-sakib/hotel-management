<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Dashboard | AzureStay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="../index.html" aria-label="AzureStay home">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 21h18" />

            <path d="M5 21V10a7 7 0 0 1 14 0v11" />
            <path d="M12 7l1.5 2.5H16l-2 2 1 3-3-2-3 2 1-3-2-2h2.5L12 7z" fill="currentColor" stroke="none" />
          </svg>
        </span>
        <span>AzureStay</span>
      </a>
      <nav class="main-nav" aria-label="Dashboard navigation">
        <a href="hotels.html">Hotels</a>
        <a href="../index.html#trips">Trips</a>
        <a href="../index.html#reviews">Reviews</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme">
          <span class="svg-icon" data-theme-icon aria-hidden="true"></span>
        </button>
        <button class="secondary-button compact" type="button" data-logout>Logout</button>
      </div>
    </header>

    <main class="dashboard-main">
      <section class="dashboard-hero">
        <div>
          <p class="eyebrow">Guest dashboard</p>
          <h1 data-dashboard-name>Your stays, payments, and booking requests.</h1>
          <p data-dashboard-subtitle>Track your hotel requests, approved stays, and payment actions from one place.</p>
        </div>
        <a class="primary-button" href="hotels.html">Request another booking</a>
      </section>

      <section class="dashboard-metrics" data-dashboard-metrics></section>

      <section class="dashboard-grid">
        <article class="dashboard-card">
          <div class="card-heading">
            <div>
              <p class="eyebrow">Booking center</p>
              <h2>My bookings</h2>
            </div>
          </div>
          <div class="booking-filters" data-booking-filters>
            <button class="filter-tab active" data-filter="all">All Bookings</button>
            <button class="filter-tab" data-filter="pending">Pending</button>
            <button class="filter-tab" data-filter="approved">Confirmed</button>
            <button class="filter-tab" data-filter="unpaid">Payment Needed</button>
          </div>
          <div class="dashboard-list" data-user-bookings></div>
        </article>

        <aside class="dashboard-card">
          <div class="card-heading">
            <div>
              <p class="eyebrow">Profile</p>
              <h2>Account</h2>
            </div>
          </div>
          <div class="profile-panel" data-user-profile></div>
        </aside>
      </section>
    </main>

    <!-- Invoice Receipt Modal -->
    <div class="modal" id="receipt-modal" data-modal>
      <div class="modal-card" style="width: min(520px, 100%);">
        <button class="modal-close ghost-button compact" type="button" data-close-modal aria-label="Close modal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="modal-copy" style="margin-bottom: 0.5rem; padding-bottom: 0.5rem;">
          <p class="eyebrow">AzureStay Premium Billing</p>
          <h2 style="font-size: 1.35rem;">Stay Payment Receipt</h2>
        </div>
        <div class="modal-body-scroll" style="max-height: 70vh; overflow: auto; padding-right: 0.25rem;">
          <div class="receipt-paper" id="receipt-paper-content">
            <!-- Dynamically populated receipt content -->
          </div>
        </div>
      </div>
    </div>

    <div class="toast-stack" data-toast-stack></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="module" src="../assets/js/dashboard.js"></script>
  </body>
</html>
