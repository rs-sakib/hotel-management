<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Dashboard | AzureStay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header" data-header>
      <a class="brand" href="../index.html" aria-label="AzureStay home">
        <span class="brand-mark">A</span>
        <span>AzureStay</span>
      </a>
      <nav class="main-nav" aria-label="Dashboard navigation">
        <a href="../index.html#hotels">Hotels</a>
        <a href="../index.html#trips">Trips</a>
        <a href="../index.html#reviews">Reviews</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Toggle color theme">
          <span class="svg-icon" data-theme-icon aria-hidden="true"></span>
          <span data-theme-label>Light</span>
        </button>
        <button class="secondary-button compact" type="button" data-logout>Logout</button>
      </div>
    </header>

    <main class="dashboard-main">
      <section class="dashboard-hero">
        <div>
          <p class="eyebrow">Guest dashboard</p>
          <h1 data-dashboard-name>Your stays, payments, and booking requests.</h1>
          <p data-dashboard-subtitle>Track your hotel requests, approved stays, and payment actions from one place.</p>
        </div>
        <a class="primary-button" href="../index.html#hotels">Request another booking</a>
      </section>

      <section class="dashboard-metrics" data-dashboard-metrics></section>

      <section class="dashboard-grid">
        <article class="dashboard-card">
          <div class="card-heading">
            <div>
              <p class="eyebrow">Booking center</p>
              <h2>My bookings</h2>
            </div>
          </div>
          <div class="dashboard-list" data-user-bookings></div>
        </article>

        <aside class="dashboard-card">
          <div class="card-heading">
            <div>
              <p class="eyebrow">Profile</p>
              <h2>Account</h2>
            </div>
          </div>
          <div class="profile-panel" data-user-profile></div>
        </aside>
      </section>
    </main>

    <div class="toast-stack" data-toast-stack></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="module" src="../assets/js/dashboard.js"></script>
  </body>
</html>
